name: build

on:
  push:
    branches:
      - master
      - rel/*
    tags: ['*']
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - master
      - rel/*
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  NUGET_PACKAGES: ${{ github.workspace }}/.packages
  NUGET_XMLDOC_MODE: skip
  TERM: xterm

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            os_name: macos
          - os: ubuntu-latest
            os_name: linux
          - os: windows-latest
            os_name: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set Build ID
        if: ${{ startsWith(github.ref, 'refs/pull/') == false }}
        shell: pwsh
        run: |
          $Now = (Get-Date).ToUniversalTime()
          $Hours = $Now.Hour * 4
          $QuarterHours = [Math]::Floor($Now.Minute / 15.0)
          $Revision = $Hours + $QuarterHours + 1
          $BuildId = $Now.ToString("yyyyMMdd") + "." + $Revision
          Write-Output "_ComputedOfficialBuildId=${BuildId}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache packages
        uses: actions/cache@v5
        with:
          path: |
            .dotnet
            .packages
          key: ${{ runner.os }}-packages

      - name: Build, Test and Package
        if: ${{ runner.os == 'Windows' }}
        run: .\eng\common\CIBuild.cmd -configuration Release -prepareMachine -integrationTest /p:RestoreDotNetWorkloads=true

      - name: Build, Test and Package
        if: ${{ runner.os != 'Windows' }}
        run: ./eng/common/cibuild.sh -configuration Release -prepareMachine -integrationTest /p:RestoreDotNetWorkloads=true

      - name: Publish logs
        continue-on-error: true
        uses: actions/upload-artifact@v5
        if: ${{ always() }}
        with:
          name: logs-${{ matrix.os_name }}
          path: ./artifacts/log/Release

      - name: Publish NuGet packages
        continue-on-error: true
        uses: actions/upload-artifact@v5
        with:
          name: packages-${{ matrix.os_name }}
          path: ./artifacts/packages/Release/Shipping

      - name: Publish test results
        continue-on-error: true
        uses: actions/upload-artifact@v5
        if: ${{ always() }}
        with:
          name: testresults-${{ matrix.os_name }}
          path: ./artifacts/TestResults/Release

  publish:
    needs: [ build ]
    runs-on: ubuntu-latest

    if: |
      github.event.repository.fork == false &&
      (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))

    steps:
      - name: Download packages
        uses: actions/download-artifact@v5
        with:
          name: packages-windows

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Push NuGet packages to NuGet.org
        run: dotnet nuget push "*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate --source https://api.nuget.org/v3/index.json
