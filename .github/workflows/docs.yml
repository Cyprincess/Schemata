name: docs

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  NUGET_PACKAGES: ${{ github.workspace }}/.packages
  NUGET_XMLDOC_MODE: none
  TERM: xterm

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Cache packages
        uses: actions/cache@v5
        with:
          path: |
            .dotnet
            .packages
          key: ${{ runner.os }}-packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install docfx
        run: dotnet tool install -g docfx

      - name: Build
        run: ./eng/common/build.sh --restore --build --ci --configuration Release --prepareMachine /p:RestoreDotNetWorkloads=true

      - name: Generate API metadata
        run: docfx metadata docs/docfx.json

      - name: Build documentation site
        run: docfx build docs/docfx.json

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/_site

  deploy:
    name: Deploy to GitHub Pages
    needs: [build]
    runs-on: ubuntu-latest

    if: github.event.repository.fork == false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
